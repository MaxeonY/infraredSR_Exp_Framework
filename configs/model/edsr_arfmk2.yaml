in_channels: 1
out_channels: 1
n_resblocks: 16
n_feats: 64
res_scale: 0.1

# Shared MLP router hidden dimension.
# The router maps [d_i, c_i, d_i*c_i] → softmax branch weights.
# Larger values increase expressiveness at negligible parameter cost.
router_hidden_dim: 32

# Branch set is fixed in code (Section 7, minimum viable version):
#   branch 0 : DW-3×3, dilation=1
#   branch 1 : DW-3×3, dilation=2
#   branch 2 : DW-5×5, dilation=1
#
# Routing weight formula (Section 3):
#   w_i = Softmax( MLP( [d_i, c_i, d_i * c_i] ) )
#   d_i = i / (L - 1)                                    # relative depth
#   c_i = (log C_i - log C_min) / (log C_max - log C_min)  # log-channel scale
